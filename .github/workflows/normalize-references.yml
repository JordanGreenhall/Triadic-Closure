name: Normalize corpus references

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/normalize_references.py'
      - 'tools/finalize_reference_normalization.py'
      - '.github/workflows/normalize-references.yml'

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize Markdown references
        run: |
          # Run both passes: structural normalization, then source-provenance adjudication.
          python3 tools/normalize_references.py
          python3 tools/finalize_reference_normalization.py

      - name: Commit repaired references
        run: |
          if git diff --quiet && git diff --cached --quiet && [ ! -f reference-repair-report.md ]; then
            echo 'No reference changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          if git diff --cached --quiet; then
            echo 'No staged changes.'
            exit 0
          fi
          git commit -m 'Finalize corpus source and link repairs'
          git push
