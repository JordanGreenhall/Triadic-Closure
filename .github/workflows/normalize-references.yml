name: Normalize corpus references

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/import_flavor_mark_metric_and_neutron.py'
      - 'tools/import_neutron_consideration.py'
      - 'tools/normalize_references.py'
      - 'tools/finalize_reference_normalization.py'
      - 'tools/normalize_mass_ratio.py'
      - '.github/workflows/normalize-references.yml'

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore missing current pages
        run: |
          python3 tools/import_flavor_mark_metric_and_neutron.py
          python3 tools/import_neutron_consideration.py

      - name: Normalize Markdown references
        run: |
          python3 tools/normalize_references.py
          python3 tools/finalize_reference_normalization.py

      - name: Normalize proton-electron mass-ratio language
        run: python3 tools/normalize_mass_ratio.py

      - name: Commit repaired corpus
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          if git diff --cached --quiet; then
            echo 'No staged changes.'
            exit 0
          fi
          git commit -m 'Normalize canonical proton-electron mass ratio across corpus'
          git push
