name: X1 reconstruct verified artifacts

on:
  push:
    branches:
      - agent/normalization-x1-persistent
    paths:
      - '.x1-payload/**'
      - '.github/workflows/x1-reconstruct.yml'

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact X1 artifact set
        shell: bash
        run: |
          set -euo pipefail
          cat .x1-payload/chunk-* > /tmp/x1-payload.b64
          base64 --decode /tmp/x1-payload.b64 > /tmp/x1-payload.tar.gz
          tar -xzf /tmp/x1-payload.tar.gz -C .
          rm -rf .x1-payload
          rm -f .github/workflows/x1-reconstruct.yml

      - name: Verify X1
        shell: bash
        run: |
          set -euo pipefail
          python3 _compiler/verify_x1_algebra.py > /tmp/x1-countermodels.txt
          cmp /tmp/x1-countermodels.txt _compiler/verification/x1-exact-countermodels.txt
          python3 _compiler/verify_x1.py --base 79e113e4fce6498b303c5fdbc4a76b841a014f69
          python3 -m py_compile _compiler/verify_x1.py _compiler/verify_x1_algebra.py _compiler/run_x1_failure_simulations.py

      - name: Commit normalized X1 artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Triadic Normalization Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "normalize: establish X1 physics-chemistry interface boundary"
          git push origin HEAD:agent/normalization-x1-persistent
