name: Final frequency-weight scan

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/foundation-audit-execution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-audit-execution
          fetch-depth: 0
      - name: Correct propagation paper and scan
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('propagation-invariant-velocity-and-modal-structure.md')
          text = p.read_text(encoding='utf-8')
          old = '''**The genuine open frontier.** The framework supplies the *structure* of the transition — a realizability field of multiple forks, from which one actual is selected and stands. It does not, as presented here, supply the *measure* on the selection: why the selection is weighted as it is (the Born rule, the |ψ|²-weighting of outcomes). Deriving that measure from the structure of realizability is the open problem this account locates but does not close.'''
          new = '''**Selection weighting.** The structure of the transition is supplied here: a realizability field of multiple forks, from which one actual is selected and stands. The measure on that selection is supplied by the Registered Realizability Weighting Law and its Born instance, `|h(σ,k)|²`. No separate frequency bridge is required. Absolute local transition rates still require the possibility-space and rate structure of the process.'''
          if old not in text:
              raise SystemExit('Expected propagation frontier paragraph not found')
          text = text.replace(old, new)
          old_summary = 'The **Born measure** on the selection is the open frontier.'
          new_summary = 'The **Born measure** on the selection is supplied by the Registered weighting law; absolute local transition rates remain process-specific.'
          if old_summary not in text:
              raise SystemExit('Expected propagation summary sentence not found')
          text = text.replace(old_summary, new_summary)
          p.write_text(text, encoding='utf-8')
          PY
          echo '--- residual weighting-language scan ---'
          grep -RniE 'frequency[[:space:]]*=[[:space:]]*weight|Born measure.{0,80}[Oo]pen|Born rule.{0,80}[Oo]pen' --include='*.md' . \
            | grep -v 'archivist-instructions-foundation-audit.md' \
            | grep -v '_compiler/' \
            || true
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add propagation-invariant-velocity-and-modal-structure.md
          git commit -m "Align propagation paper with weighting law"
          git push origin HEAD:agent/foundation-audit-execution
