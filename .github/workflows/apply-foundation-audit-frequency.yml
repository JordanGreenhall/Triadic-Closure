name: Complete foundation audit frequency-weight dissolution

on:
  pull_request:
    branches: [main]
    types: [synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/foundation-audit-execution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-audit-execution
          fetch-depth: 0
      - name: Apply exact remaining substitutions
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('physics-chemistry-gate-crossing.md')
          text = p.read_text(encoding='utf-8')
          old = '  - realizability-weighting-law             # |·|² measure; propensity (carries frequency=weight caveat)'
          new = '  - realizability-weighting-law             # |·|² coherence-participation measure; no frequency bridge required'
          if old not in text:
              old = '   - realizability-weighting-law             # |·|² measure; propensity (carries frequency=weight caveat)'
              new = '   - realizability-weighting-law             # |·|² coherence-participation measure; no frequency bridge required'
          text = text.replace(old, new)
          p.write_text(text, encoding='utf-8')

          p = Path('02-amplitude-readout.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              '| `propagation-…` (both) | explicitly marks the Born measure / frequency as Open | **no** — defers, places no load | ✓ consistent |',
              '| `propagation-…` (both) | distinguishes native weighting from local observed rates | no generic frequency bridge required | ✓ consistent |'
          )
          p.write_text(text, encoding='utf-8')

          assert 'carries frequency=weight caveat' not in Path('physics-chemistry-gate-crossing.md').read_text(encoding='utf-8')
          assert 'Born measure / frequency as Open' not in Path('02-amplitude-readout.md').read_text(encoding='utf-8')
          PY
      - name: Commit exact substitutions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 02-amplitude-readout.md physics-chemistry-gate-crossing.md
          if git diff --cached --quiet; then
            echo "No additional document changes required."
          else
            git commit -m "Remove remaining frequency-weight caveats"
            git push origin HEAD:agent/foundation-audit-execution
          fi
