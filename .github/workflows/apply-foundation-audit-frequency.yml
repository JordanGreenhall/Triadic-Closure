name: Complete foundation audit frequency-weight dissolution

on:
  pull_request:
    branches: [main]
    types: [synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/foundation-audit-execution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/foundation-audit-execution
          fetch-depth: 0
      - name: Remove remaining stale caveat language
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('physics-chemistry-gate-crossing.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              '   - realizability-weighting-law             # |·|² measure; propensity (carries frequency=weight caveat)',
              '   - realizability-weighting-law             # |·|² coherence-participation measure; no frequency bridge required'
          )
          text = text.replace(
              '  - realizability-weighting-law             # |·|² measure; propensity (carries frequency=weight caveat)',
              '  - realizability-weighting-law             # |·|² coherence-participation measure; no frequency bridge required'
          )
          p.write_text(text, encoding='utf-8')

          p = Path('02-amplitude-readout.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              '| `propagation-…` (both) | explicitly marks the Born measure / frequency as Open | **no** — defers, places no load | ✓ consistent |',
              '| `propagation-…` (both) | distinguishes native weighting from local observed rates | no generic frequency bridge required | ✓ consistent |'
          )
          p.write_text(text, encoding='utf-8')

          prohibited = [
              r'frequency\s*=\s*weight.{0,80}(open|blocker|caveat|condition)',
              r'(open|blocker|caveat|condition).{0,80}frequency\s*=\s*weight',
              r'Born measure / frequency as Open',
          ]
          allowed = {'archivist-instructions-foundation-audit.md'}
          violations = []
          for path in Path('.').rglob('*.md'):
              if path.name in allowed or '.git' in path.parts:
                  continue
              content = path.read_text(encoding='utf-8')
              head = content[:1200]
              if not re.search(r'(?m)^(status:\s*(current|control)|type:\s*(result|deposit|process))', head):
                  continue
              for pattern in prohibited:
                  if re.search(pattern, content, re.I | re.S):
                      violations.append(f'{path}: {pattern}')
          if violations:
              raise SystemExit('Stale frequency-weight caveat language remains:\n' + '\n'.join(violations))
          PY
      - name: Commit final caveat cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 02-amplitude-readout.md physics-chemistry-gate-crossing.md
          if git diff --cached --quiet; then
            echo "No additional document changes required."
          else
            git commit -m "Remove remaining frequency-weight caveats"
            git push origin HEAD:agent/foundation-audit-execution
          fi
